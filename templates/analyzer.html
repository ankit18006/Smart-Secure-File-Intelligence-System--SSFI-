{% extends "base.html" %}
{% block content %}

<div class="space-y-8 animate-in fade-in duration-700">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<div>
<h2 class="text-3xl font-bold text-emerald-400"><i class="fas fa-microscope mr-2"></i> Intelligence Analyzer</h2>
<p class="text-slate-400 mt-1">Select a dataset to extract statistical insights.</p>
</div>

</div>

<script src=""></script>

<script>
{% if stats %}
const ctxPie = document.getElementById('csvPieChart').getContext('2d');
new Chart(ctxPie, {
type: 'doughnut',
data: {
labels: ['Mean', 'Std Dev', 'Min', 'Max'],
datasets: [{
data: [40, 20, 15, 25],
backgroundColor: ['#10b981', '#0ea5e9', '#6366f1', '#f59e0b'],
borderWidth: 0
}]
},
options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
});

</script>

<style>
.custom-data-table table { width: 100%; border-collapse: collapse; color: #cbd5e1; }
.custom-data-table th { text-align: left; padding: 1rem; background: rgba(255, 255, 255, 0.05); color: #34d399; border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
.custom-data-table td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-family: 'JetBrains Mono', monospace; }
</style>

{% endblock %}
