{% extends "base.html" %}
{% block content %}
<div class="space-y-8 animate-in fade-in duration-700">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h2 class="text-3xl font-bold text-emerald-400"><i class="fas fa-microscope mr-2"></i> Intelligence Analyzer</h2>
            <p class="text-slate-400 mt-1">Select a dataset to extract statistical insights.</p>
        </div>
        <form action="/analyzer" method="GET" class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/10">
            <select name="file" class="bg-[#1e293b] text-white text-sm rounded-xl px-4 py-2 outline-none cursor-pointer">
                <option value="" disabled selected>Choose CSV...</option>
                {% for f in csv_files %}
                <option value="{{ f }}">{{ f }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold transition-all">Analyze Now</button>
        </form>
    </div>

    <div class="bg-white/5 rounded-3xl border border-white/10 overflow-hidden shadow-2xl">
        <div class="p-6 overflow-x-auto min-h-[400px]">
            {% if stats %}
                <div class="custom-data-table">{{ stats | safe }}</div>
            {% else %}
                <div class="flex flex-col items-center justify-center py-20 text-center text-slate-500">
                    <i class="fas fa-folder-open text-4xl mb-4"></i>
                    <h4 class="text-xl font-semibold">No Data Analyzed</h4>
                </div>
            {% endif %}
        </div>
    </div>
</div>

<style>
    .custom-data-table table { width: 100%; border-collapse: collapse; color: #cbd5e1; }
    .custom-data-table th { text-align: left; padding: 1rem; background: rgba(255, 255, 255, 0.05); color: #34d399; border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
    .custom-data-table td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-family: 'JetBrains Mono', monospace; }
</style>
{% endblock %}
