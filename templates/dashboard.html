{% extends "base.html" %}
{% block content %}
<div class="p-8 bg-white/5 rounded-3xl border border-white/10">
    <h2 class="text-3xl font-bold mb-6 text-emerald-400">Welcome to Dashboard</h2>
    <form action="/upload" method="POST" enctype="multipart/form-data" class="mb-8">
        <input type="file" name="file" class="bg-white/10 p-4 rounded-xl mb-4 block w-full">
        <button type="submit" class="bg-emerald-500 px-6 py-3 rounded-xl font-bold">Upload & Secure</button>
    </form>
    <div class="space-y-2">
        {% for file in files %}
        <div class="p-4 bg-white/5 rounded-xl border border-white/5 font-mono">{{ file }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
