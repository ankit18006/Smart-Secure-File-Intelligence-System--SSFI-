<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="bg-white/5 backdrop-blur-xl p-10 rounded-3xl border border-white/10 shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-fingerprint text-5xl text-sky-500 mb-4"></i>
            <h2 class="text-3xl font-bold">Secure Access</h2>
            <p class="text-slate-400">Enter credentials for SSFI Enterprise</p>
        </div>
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm mb-2 text-slate-400">Username</label>
                <input type="text" name="username" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="block text-sm mb-2 text-slate-400">Master Password</label>
                <input type="password" name="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 transition">
            </div>
            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-sky-500/20">
                Unlock System
            </button>
        </form>
    </div>
</body>
</html>
