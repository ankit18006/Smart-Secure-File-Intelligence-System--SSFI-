<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSFI Enterprise | Smart Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">
    <div class="flex">
        <aside class="w-64 h-screen sticky top-0 bg-white/5 backdrop-blur-lg border-r border-white/10 p-6 flex flex-col">
            <div class="mb-10 flex items-center gap-3">
                <div class="bg-sky-500 p-2 rounded-lg text-white">
                    <i class="fas fa-shield-halved text-xl"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">SSFI <span class="text-sky-400">PRO</span></h1>
            </div>
            
            <nav class="flex-1 space-y-2">
                <a href="/dashboard" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                    <i class="fas fa-layer-group text-sky-400"></i> Dashboard
                </a>
                <a href="/analyzer" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                    <i class="fas fa-chart-line text-emerald-400"></i> Data Analyzer
                </a>
                <a href="/logs" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                    <i class="fas fa-terminal text-amber-400"></i> System Logs
                </a>
                <a href="/admin" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                    <i class="fas fa-user-shield text-purple-400"></i> Admin Audit
                </a>
            </nav>

            <div class="mt-auto pt-6 border-t border-white/10">
                <a href="/logout" class="flex items-center gap-3 p-3 text-red-400 hover:bg-red-400/10 rounded-xl transition">
                    <i class="fas fa-power-off"></i> Logout
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="mb-6 p-4 bg-sky-500/20 border border-sky-500/50 text-sky-200 rounded-xl animate-pulse">
                      {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
