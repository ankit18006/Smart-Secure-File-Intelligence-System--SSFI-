<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSFI Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">
    <nav class="border-b border-white/10 px-6 py-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-shield-halved text-emerald-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter uppercase">SSFI SYSTEM</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-semibold text-slate-400">
                <a href="/dashboard" class="hover:text-emerald-400 transition">Dashboard</a>
                <a href="/analyzer" class="hover:text-emerald-400 transition">Analyzer</a>
                <a href="/logs" class="hover:text-emerald-400 transition">Audit Logs</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
